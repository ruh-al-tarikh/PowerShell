version: 2

updates:
  # -------------------------
  # MAIN BRANCH
  # -------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "CL-BuildPackaging"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "CL-BuildPackaging"
    open-pull-requests-limit: 5


  # -------------------------
  # RELEASE BRANCHES (EXPLICIT)
  # -------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "release/7.4"
    schedule:
      interval: "daily"
    labels:
      - "CL-BuildPackaging"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "release/7.3"
    schedule:
      interval: "daily"
    labels:
      - "CL-BuildPackaging"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "release/7.4"
    schedule:
      interval: "weekly"
    labels:
      - "CL-BuildPackaging"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "release/7.3"
    schedule:
      interval: "weekly"
    labels:
      - "CL-BuildPackaging"
